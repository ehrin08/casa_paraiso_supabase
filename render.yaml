services:
  - type: web
    name: casa-paraiso-supabase-api-poc
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Set these in Render after the service is created. APP_URL must be the
      # public HTTPS URL of this Render service.
      - key: APP_URL
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Manila
      - key: APP_KEY
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: FORCE_HTTPS
        value: "true"
      - key: HSTS_ENABLED
        value: "false"
      - key: TRUSTED_PROXIES
        value: "*"
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_HTTP_ONLY
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: MAIL_MAILER
        value: array
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SEARCH_PATH
        value: casa,public
      - key: DB_SSLMODE
        value: verify-full
      - key: DB_SSLROOTCERT
        value: /etc/secrets/supabase-prod-ca-2021.crt
      - key: MOBILE_PAIRING_ENABLED
        value: "true"
      - key: MOBILE_INSTANCE_ID
        sync: false
      - key: MOBILE_DEMO_APK_ENABLED
        value: "false"
      - key: MOBILE_GOOGLE_CACHE_STORE
        value: database
      - key: MOBILE_CORS_ALLOWED_ORIGINS
        value: https://localhost,capacitor://localhost
      # Google OAuth credentials are created in Google Cloud Console and must
      # remain private Render environment variables.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
