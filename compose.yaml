name: casa-paraiso-supabase

services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.2'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
                MYSQL_CLIENT: mariadb-client
        image: 'casa-paraiso-supabase/sail-8.2:local'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '127.0.0.1:${APP_PORT:-18001}:80'
            - '127.0.0.1:${FORWARD_VITE_PORT:-15173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
            - type: volume
              source: sail-vendor
              target: /var/www/html/vendor
              volume:
                  nocopy: true
        networks:
            - sail
        depends_on:
            - mariadb
            - pgsql
            - mailpit
    cloudflared:
        image: 'cloudflare/cloudflared:2026.7.1'
        command: tunnel --no-autoupdate --url http://laravel.test
        profiles:
            - tunnel
        networks:
            - sail
        depends_on:
            - laravel.test
    mariadb:
        image: 'mariadb:11.8.8'
        ports:
            - '127.0.0.1:${FORWARD_DB_PORT:-13307}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${LOCAL_MARIADB_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${LOCAL_MARIADB_DATABASE:-casa_paraiso}'
            MYSQL_USER: '${LOCAL_MARIADB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${LOCAL_MARIADB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        volumes:
            - 'sail-mariadb:/var/lib/mysql'
            - './vendor/laravel/sail/database/mariadb/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
            - './storage/backups/migration:/migration:ro'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - healthcheck.sh
                - '--connect'
                - '--innodb_initialized'
            retries: 3
            timeout: 5s
    pgsql:
        image: 'postgres:17-alpine'
        ports:
            - '127.0.0.1:${FORWARD_PGSQL_PORT:-15432}:5432'
        environment:
            POSTGRES_DB: '${POSTGRES_DB:-casa_paraiso}'
            POSTGRES_USER: '${POSTGRES_USER:-sail}'
            POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-password}'
        volumes:
            - 'sail-postgres:/var/lib/postgresql/data'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -q -d $${POSTGRES_DB} -U $${POSTGRES_USER}'
            retries: 5
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:v1.28.3'
        ports:
            - '127.0.0.1:${FORWARD_MAILPIT_PORT:-11026}:1025'
            - '127.0.0.1:${FORWARD_MAILPIT_DASHBOARD_PORT:-18025}:8025'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-mariadb:
        driver: local
    sail-postgres:
        driver: local
    sail-vendor:
        driver: local
